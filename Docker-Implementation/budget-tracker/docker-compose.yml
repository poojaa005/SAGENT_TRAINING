version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: budget-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Pass@3110
      MYSQL_DATABASE: budget_tracker
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -pPass@3110 --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    volumes:
      - budget_mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: budget-backend
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/budget_tracker
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Pass@3110

  frontend:
    build: ./frontend
    container_name: budget-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  budget_mysql_data:
