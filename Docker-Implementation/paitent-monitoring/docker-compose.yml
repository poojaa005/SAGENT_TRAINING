services:
  mysql:
    image: mysql:8.4
    container_name: patient-monitoring-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DOCKER_DB_NAME:-patient_monitoring}
      MYSQL_ROOT_PASSWORD: ${DOCKER_DB_PASSWORD:-Pass@3110}
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: patient-monitoring-backend
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DOCKER_DB_NAME:-patient_monitoring}
      DB_USERNAME: root
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-Pass@3110}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}

  frontend:
    build:
      context: ./frontend
    container_name: patient-monitoring-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:8080}

volumes:
  mysql_data:
